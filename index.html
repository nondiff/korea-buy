<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇰🇷 韓國連線採購誌</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ==========================================================================
           1. 全域樣式與配色定義 (暖系日韓雜貨風，100%致敬截圖高質感)
           ========================================================================== */
        :root {
            --bg-color: #121212;
            /* 仿 iOS 暗色背景底色 */
            --app-bg: #F5F2EB;
            /* 主體暖奶油色背景 */
            --card-bg: #FAF8F5;
            /* 卡片純淨暖白色 */
            --text-main: #3C2F2F;
            /* 深可可色（取代死黑，提升質感） */
            --text-muted: #8A7A71;
            /* 灰褐輔助色 */
            --accent-color: #D06A58;
            /* 珊瑚橘紅點綴色 */
            --border-light: #E6E1D8;
            /* 淺灰色邊框 */
            --shadow-soft: 0 8px 24px rgba(60, 47, 47, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 限制手機版最佳寬度 */
        .phone-wrapper {
            width: 100%;
            max-width: 480px;
            background-color: var(--app-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            padding: 20px 16px 100px 16px;
            overflow-x: hidden;
        }

        /* ==========================================================================
           2. 頁首與頂部匯率區
           ========================================================================== */
        .app-header {
            text-align: center;
            padding: 24px 0 16px 0;
        }

        .app-header h1 {
            font-family: 'Comfortaa', 'Noto Sans TC', sans-serif;
            font-size: 26px;
            margin: 0 0 6px 0;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .app-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
            letter-spacing: 0.5px;
        }

        .exchange-widget {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-light);
            margin-bottom: 20px;
        }

        .exchange-widget .rate-title {
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exchange-widget .rate-input-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .exchange-widget input {
            width: 60px;
            border: 1px solid var(--border-light);
            background-color: #fff;
            border-radius: 8px;
            padding: 4px 8px;
            text-align: center;
            font-size: 15px;
            font-family: 'Comfortaa', sans-serif;
            color: var(--text-main);
            outline: none;
            font-weight: 700;
        }

        /* ==========================================================================
           3. 分頁與篩選器 (Tabs)
           ========================================================================== */
        .tabs-nav {
            display: flex;
            background-color: #E6E1D8;
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 18px;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .tab-btn.active {
            background-color: var(--card-bg);
            color: var(--text-main);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* ==========================================================================
           4. 商品清單卡片展示 (Dashboard List)
           ========================================================================== */
        .items-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-row-card {
            background-color: var(--card-bg);
            border-radius: 18px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-soft);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .item-row-card:active {
            transform: scale(0.98);
        }

        .item-row-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--border-light);
            background-color: #fff;
        }

        .item-row-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .item-row-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-row-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
        }

        .item-row-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-color);
            font-family: 'Comfortaa', sans-serif;
        }

        .check-badge {
            font-size: 18px;
            color: #C5E1A5;
            margin-left: auto;
            cursor: pointer;
            padding: 8px;
            margin-right: -8px;
            transition: transform 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-badge:active {
            transform: scale(0.85);
        }

        .check-badge.todo {
            color: #E0DDD5;
        }

        .check-badge.updating {
            color: var(--text-muted);
            pointer-events: none;
        }

        /* ==========================================================================
           5. 彈出式詳情視窗 (Detail Modal - 精準復刻自 image_9c4e3a.jpg)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.85);
            /* 仿 iOS 磨砂黑背景 */
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .modal-card {
            width: 100%;
            max-width: 410px;
            background-color: var(--card-bg);
            border-radius: 40px;
            /* 超高質感大圓角 */
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes modalFadeIn {
            from {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }

            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-title-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 85%;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.3;
        }

        .modal-subtitle {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .modal-close-btn {
            border: none;
            background: none;
            font-size: 22px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close-btn:hover {
            color: var(--accent-color);
        }

        /* 100% 復刻：精緻灰色虛線相框 */
        .modal-img-container {
            border: 2px dashed #E0DCD5;
            border-radius: 28px;
            padding: 12px;
            background-color: #FFF;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 240px;
        }

        .modal-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 16px;
        }

        /* 資訊專屬白色獨立區塊 */
        .detail-tile-box {
            background-color: #FAF8F5;
            border-radius: 18px;
            padding: 14px 18px;
            border: 1px solid rgba(230, 225, 216, 0.5);
        }

        .tile-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .tile-value {
            font-size: 14px;
            color: var(--text-main);
            line-height: 1.5;
            text-align: left;
        }

        /* 價格特化樣式 */
        .price-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .price-value {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Comfortaa', sans-serif;
            color: var(--text-main);
        }

        /* 地點特化樣式 */
        .location-box {
            text-align: center;
        }

        .location-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
        }

        .modal-hint-text {
            font-size: 10.5px;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            padding: 5px 10px;
        }

        /* 編輯與按鈕樣式 */
        .edit-input, .edit-textarea {
            width: 100%;
            border: 1px solid var(--border-light);
            background-color: #fff;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }
        .edit-input:focus, .edit-textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(208, 106, 88, 0.15);
        }
        .edit-textarea {
            resize: vertical;
            min-height: 80px;
        }
        .save-btn {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(208, 106, 88, 0.2);
            width: 100%;
            margin-top: 10px;
        }
        .save-btn:hover {
            background-color: #b95645;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(208, 106, 88, 0.3);
        }
        .save-btn:active {
            transform: translateY(0);
        }
        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 懸浮新增按鈕 (FAB) */
        .fab-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            box-shadow: 0 4px 16px rgba(208, 106, 88, 0.4);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 90;
        }
        .fab-btn:hover {
            transform: scale(1.1) rotate(90deg);
            background-color: #b95645;
            box-shadow: 0 6px 20px rgba(208, 106, 88, 0.5);
        }
        .fab-btn:active {
            transform: scale(0.95);
        }

        /* 針對桌機版的定位調整 (讓它懸浮在手機框右下角) */
        @media (min-width: 480px) {
            .fab-btn {
                right: calc(50% - 224px);
            }
        }
    </style>
</head>

<body>

    <div class="phone-wrapper">
        <header class="app-header">
            <h1>🇰🇷 Seoul Buy Log</h1>
            <p>2026 韓國採購清單 & 即時連線</p>
            <button class="refresh-btn" onclick="fetchFromNotion()">
                <i class="fa-solid fa-arrows-rotate"></i> 點此手動重整同步
            </button>
        </header>

        <div class="exchange-widget">
            <div class="rate-title">
                <i class="fa-solid fa-calculator" style="color: var(--accent-color)"></i>
                <span>目前匯率 (1 TWD 可換)</span>
            </div>
            <div class="rate-input-container">
                <input type="number" id="twdRate" value="48" min="1" oninput="calculateAllPrices()">
                <span style="font-size:13px; font-weight:700;">KRW</span>
            </div>
        </div>

        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchCategory('all')">全部商品</button>
            <button class="tab-btn" onclick="switchCategory('yishan')">依姍</button>
            <button class="tab-btn" onclick="switchCategory('co_buy')">共同必買</button>
        </nav>

        <main class="items-grid" id="itemsContainer">
        </main>
        
        <!-- Floating Add Button -->
        <button class="fab-btn" onclick="openAddModal()">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div class="modal-overlay" id="detailModal" onclick="closeModalOnOuter(event)">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title-group">
                    <span class="modal-title" id="modalName">---</span>
                    <span class="modal-subtitle">編輯商品資訊</span>
                </div>
                <button class="modal-close-btn" onclick="closeModal()">×</button>
            </div>

            <div class="modal-img-container">
                <img class="modal-img" id="modalImg" src="" alt="商品圖片">
            </div>

            <div class="detail-tile-box">
                <div class="tile-label">✧ 備註說明</div>
                <textarea class="edit-textarea" id="modalDescInput" placeholder="請輸入備註或說明..."></textarea>
            </div>

            <div class="detail-tile-box price-box">
                <div class="tile-label">價格 (KRW ₩)</div>
                <div style="display:flex; align-items:center; gap:8px; width:100%;">
                    <span style="font-family:'Comfortaa', sans-serif; font-weight:700; color:var(--text-muted); font-size:16px;">₩</span>
                    <input type="number" class="edit-input" id="modalPriceInput" style="font-family:'Comfortaa', sans-serif; font-weight:700;" placeholder="0" min="0">
                </div>
                <div class="modal-hint-text" id="modalTwdPriceHint" style="margin-top:6px; font-weight:700; color:var(--accent-color);">約 NT$ 0</div>
            </div>

            <div class="detail-tile-box location-box">
                <div class="tile-label">地點</div>
                <div class="location-value" id="modalLoc">---</div>
            </div>

            <button class="save-btn" id="modalSaveBtn" onclick="saveItemChanges()">
                <i class="fa-solid fa-cloud-arrow-up"></i> 儲存變更
            </button>

            <div class="modal-hint-text">點擊空白處或上方關閉返回列表</div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal" onclick="closeAddModalOnOuter(event)">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title-group">
                    <span class="modal-title">新增採購商品</span>
                    <span class="modal-subtitle">即時同步至 Notion</span>
                </div>
                <button class="modal-close-btn" onclick="closeAddModal()">×</button>
            </div>

            <div class="detail-tile-box">
                <div class="tile-label">✧ 商品名稱 (必填)</div>
                <input type="text" class="edit-input" id="addName" placeholder="請輸入商品名稱...">
            </div>

            <div class="detail-tile-box">
                <div class="tile-label">✧ 類別</div>
                <select class="edit-input" id="addCategory" style="background-color: #fff; appearance: none; -webkit-appearance: none;">
                    <option value="yishan">依姍</option>
                    <option value="co_buy">共同必買</option>
                </select>
            </div>

            <div class="detail-tile-box">
                <div class="tile-label">✧ 商品圖片</div>
                <input type="file" id="addImage" accept="image/*" style="display:none;" onchange="handleImageSelect(event)">
                <div class="modal-img-container" style="height:170px; cursor:pointer; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:6px;" onclick="document.getElementById('addImage').click()">
                    <div id="addImgPlaceholder" style="color:var(--text-muted); font-size:13px; text-align:center;">
                        <i class="fa-solid fa-camera" style="font-size:28px; margin-bottom:8px; display:block; color:var(--accent-color);"></i>
                        點擊此處拍照或選擇相片
                    </div>
                    <img class="modal-img" id="addImgPreview" src="" alt="預覽圖片" style="display:none; max-height:120px; border-radius:12px;">
                    <div id="addImgSizeHint" style="font-size:11px; color:var(--text-muted); display:none; margin-top:2px;"></div>
                </div>
            </div>

            <div class="detail-tile-box price-box">
                <div class="tile-label">價格 (KRW ₩)</div>
                <div style="display:flex; align-items:center; gap:8px; width:100%;">
                    <span style="font-family:'Comfortaa', sans-serif; font-weight:700; color:var(--text-muted); font-size:16px;">₩</span>
                    <input type="number" class="edit-input" id="addPrice" style="font-family:'Comfortaa', sans-serif; font-weight:700;" placeholder="0" min="0">
                </div>
                <div class="modal-hint-text" id="addTwdPriceHint" style="margin-top:6px; font-weight:700; color:var(--accent-color);">約 NT$ 0</div>
            </div>

            <div class="detail-tile-box">
                <div class="tile-label">✧ 備註說明</div>
                <textarea class="edit-textarea" id="addDesc" placeholder="請輸入備註或說明..."></textarea>
            </div>

            <div class="detail-tile-box">
                <div class="tile-label">✧ 採購地點</div>
                <input type="text" class="edit-input" id="addLoc" placeholder="例如：東大門、Olive Young...">
            </div>

            <button class="save-btn" id="addSaveBtn" onclick="submitNewItem()">
                <i class="fa-solid fa-plus"></i> 新增商品到 Notion
            </button>

            <div class="modal-hint-text">點擊空白處或上方關閉返回列表</div>
        </div>
    </div>

    <script>
        // 🔗 您的 Cloudflare Worker 代理網址（部署完 Worker 後請在此填入您的 Worker 網址）
        const WORKER_URL = "https://seoul-buy-proxy.caici1314520.workers.dev/";

        let items = [];
        let currentFilter = 'all';
        let editingIndex = null;
        
        // 紀錄與動態學習 Notion 狀態與類別欄位使用的實際選項名稱
        let statusRegistry = { done: 'Done', todo: 'To do' };
        let categoryRegistry = { yishan: 'yishan (依姍)', co_buy: 'co_buy (共同必買)' };

        window.onload = function () {
            fetchFromNotion();
            
            // 綁定價格輸入即時換算
            document.getElementById('modalPriceInput').oninput = function () {
                const rate = parseFloat(document.getElementById('twdRate').value) || 48;
                const krw = parseFloat(this.value) || 0;
                const twd = Math.round(krw / rate);
                document.getElementById('modalTwdPriceHint').innerText = `約 NT$ ${twd.toLocaleString()}`;
            };

            // 綁定新增商品價格輸入即時換算
            document.getElementById('addPrice').oninput = function () {
                const rate = parseFloat(document.getElementById('twdRate').value) || 48;
                const krw = parseFloat(this.value) || 0;
                const twd = Math.round(krw / rate);
                document.getElementById('addTwdPriceHint').innerText = `約 NT$ ${twd.toLocaleString()}`;
            };
        };

        // 向 Notion 撈取最新資料
        async function fetchFromNotion() {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = `
                <div style="text-align:center; padding:40px; color:var(--text-muted); font-size:14px;">
                    <i class="fa-solid fa-arrows-rotate fa-spin"></i> 正在連線讀取 Notion 資料庫...
                </div>`;

            try {
                // 1. 先嘗試讀取資料庫結構 (Schema) 以動態取得 Status 屬性的所有選項
                try {
                    const schemaResponse = await fetch(WORKER_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ action: "retrieveSchema" })
                    });

                    if (schemaResponse.ok) {
                        const schemaData = await schemaResponse.json();
                        const statusProp = schemaData.properties?.Status;
                        if (statusProp) {
                            const options = statusProp.status?.options || statusProp.select?.options || [];
                            options.forEach(opt => {
                                const name = opt.name;
                                const isDone = (name.toLowerCase().includes('done') || name.includes('已') || name.includes('完')) && !name.toLowerCase().includes('todo') && !name.includes('待') && !name.includes('未');
                                if (isDone) {
                                    statusRegistry.done = name;
                                } else {
                                    const isTodo = name.toLowerCase().includes('todo') || name.includes('待') || name.includes('未') || name.toLowerCase().includes('started');
                                    if (isTodo) {
                                        statusRegistry.todo = name;
                                    }
                                }
                            });
                        }

                        // 讀取 Category 屬性的所有選項
                        const categoryProp = schemaData.properties?.Category;
                        if (categoryProp) {
                            const options = categoryProp.select?.options || [];
                            options.forEach(opt => {
                                const name = opt.name;
                                if (name.toLowerCase().includes('yishan') || name.includes('依') || name.includes('姍')) {
                                    categoryRegistry.yishan = name;
                                } else {
                                    categoryRegistry.co_buy = name;
                                }
                            });
                        }
                    }
                } catch (schemaErr) {
                    console.warn("讀取 Schema 失敗，採用預設狀態或動態學習:", schemaErr);
                }

                // 2. 呼叫安全代理 (Cloudflare Worker)
                const response = await fetch(WORKER_URL, {
                    method: "POST"
                });

                if (!response.ok) throw new Error("代理伺服器連線異常");

                const notionData = await response.json();

                if (!notionData.results) {
                    throw new Error("找不到資料");
                }

                // 100% 對齊妳截圖中的 Notion 實際欄位名稱
                items = notionData.results.map(page => {
                    const p = page.properties;

                    // 1. Name 欄位
                    const name = p.Name?.title?.[0]?.plain_text || "未命名商品";

                    // 2. Category 欄位：模糊比對文字，只要包含 yishan 就歸類到 yishan，否則歸到 co_buy
                    const rawCategory = p.Category?.select?.name || "yishan";
                    const category = rawCategory.toLowerCase().includes('yishan') ? 'yishan' : 'co_buy';

                    // 3. Price 欄位
                    const price = p.Price?.number || 0;

                    // 4. Location 欄位
                    const loc = p.Location?.rich_text?.[0]?.plain_text || "未指定地點";

                    // 5. Description 欄位
                    const desc = p.Description?.rich_text?.[0]?.plain_text || "";

                    // 6. Status 欄位：模糊比對文字，只要包含 done 就是已買到，否則為 todo
                    const rawStatus = p.Status?.select?.name || p.Status?.status?.name || "";
                    const isDone = (rawStatus.toLowerCase().includes('done') || rawStatus.includes('已') || rawStatus.includes('完')) && !rawStatus.toLowerCase().includes('todo') && !rawStatus.includes('待') && !rawStatus.includes('未');
                    
                    if (rawStatus) {
                        if (isDone) {
                            statusRegistry.done = rawStatus;
                        } else {
                            statusRegistry.todo = rawStatus;
                        }
                    }
                    
                    const status = isDone ? 'done' : 'todo';
                    const statusType = p.Status?.type || 'select';

                    // 7. Image 欄位 (處理 Notion Files & media 類型的圖片連結)
                    let img = "https://placehold.co/100x100?text=No+Image";
                    const files = p.Image?.files;
                    if (files && files.length > 0) {
                        // 優先拿外部上傳連結或是 Notion 本地託管連結
                        img = files[0].file?.url || files[0].external?.url || img;
                    }

                    return { id: page.id, category, name, price, status, statusType, loc, desc, img };
                });

                renderList();

            } catch (error) {
                console.error("Notion 同步出錯:", error);
                container.innerHTML = `
                    <div style="text-align:center; padding:30px; color:var(--accent-color); font-size:13px;">
                        <i class="fa-solid fa-triangle-exclamation"></i> 同步失敗<br>
                        <span style="font-size:11px; opacity:0.7;">請檢查 Notion 頁面右上角是否已添加 Connection 授權。</span>
                    </div>`;
            }
        }

        // 重新渲染清單
        function renderList() {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';

            const rate = parseFloat(document.getElementById('twdRate').value) || 48;

            items.forEach((item, index) => {
                if (currentFilter !== 'all' && item.category !== currentFilter) return;

                const twdPrice = Math.round(item.price / rate);
                const isDone = item.status === 'done';

                const cardHtml = `
                    <div class="item-row-card" onclick="openDetail(${index})">
                        <img class="item-row-img" src="${item.img}" alt="${item.name}">
                        <div class="item-row-info">
                            <span class="item-row-name">${item.name}</span>
                            <div class="item-row-meta">
                                <span>📍 ${item.loc.split('/')[0].trim()}</span>
                            </div>
                            <span class="item-row-price">₩${item.price.toLocaleString()} (約 NT$ ${twdPrice})</span>
                        </div>
                        <div class="check-badge ${isDone ? 'done' : 'todo'}" onclick="toggleStatus(event, ${index})">
                            <i class="fa-solid ${isDone ? 'fa-circle-check' : 'fa-circle'}"></i>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        function calculateAllPrices() {
            renderList();
        }

        function switchCategory(category) {
            currentFilter = category;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderList();
        }

        // 即時切換已採購狀態
        async function toggleStatus(event, index) {
            event.stopPropagation(); // 阻止觸發打開 Modal

            const item = items[index];
            const badge = event.currentTarget;
            
            // 防止重複點擊
            if (badge.classList.contains('updating')) return;
            badge.classList.add('updating');
            
            const originalIcon = badge.innerHTML;
            badge.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            const nextStatus = item.status === 'done' ? 'todo' : 'done';
            const targetStatusName = statusRegistry[nextStatus];

            // 根據 Notion 欄位類型包裝屬性
            const properties = {
                "Status": item.statusType === 'status' 
                    ? { "status": { "name": targetStatusName } } 
                    : { "select": { "name": targetStatusName } }
            };

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "update",
                        pageId: item.id,
                        properties: properties
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.message || errData.error || `HTTP ${response.status}`);
                }

                // 更新成功後修改本地狀態並重繪
                item.status = nextStatus;
                renderList();
            } catch (error) {
                console.error("更新狀態出錯:", error);
                alert("更新狀態失敗：" + error.message + "\n請確認 Notion 權限或網路連線！");
                // 還原圖示
                badge.classList.remove('updating');
                badge.innerHTML = originalIcon;
            }
        }

        function openDetail(index) {
            editingIndex = index;
            const item = items[index];
            const rate = parseFloat(document.getElementById('twdRate').value) || 48;
            const twdPrice = Math.round(item.price / rate);

            document.getElementById('modalName').innerText = item.name;
            document.getElementById('modalImg').src = item.img;
            document.getElementById('modalDescInput').value = item.desc;
            document.getElementById('modalPriceInput').value = item.price;
            document.getElementById('modalLoc').innerText = item.loc;

            // 即時計算台幣提示
            document.getElementById('modalTwdPriceHint').innerText = `約 NT$ ${twdPrice.toLocaleString()}`;
            
            // 重設儲存按鈕狀態
            const saveBtn = document.getElementById('modalSaveBtn');
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 儲存變更';

            document.getElementById('detailModal').style.display = 'flex';
        }

        // 儲存修改的價格與備註
        async function saveItemChanges() {
            if (editingIndex === null) return;
            const item = items[editingIndex];
            const saveBtn = document.getElementById('modalSaveBtn');
            
            const newPrice = parseFloat(document.getElementById('modalPriceInput').value) || 0;
            const newDesc = document.getElementById('modalDescInput').value.trim();

            // 鎖定按鈕並顯示載入中
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在儲存...';

            const properties = {
                "Price": { "number": newPrice },
                "Description": {
                    "rich_text": [
                        {
                            "text": {
                                "content": newDesc
                            }
                        }
                    ]
                }
            };

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "update",
                        pageId: item.id,
                        properties: properties
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.message || errData.error || `HTTP ${response.status}`);
                }

                // 更新成功後修改本地狀態並重繪
                item.price = newPrice;
                item.desc = newDesc;
                renderList();
                closeModal();
            } catch (error) {
                console.error("儲存修改出錯:", error);
                alert("儲存修改失敗：" + error.message + "\n請確認 Notion 權限或網路連線！");
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 儲存變更';
            }
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
            editingIndex = null;
        }

        function closeModalOnOuter(event) {
            if (event.target === document.getElementById('detailModal')) {
                closeModal();
            }
        }

        let compressedImageBase64 = null;

        // 新增商品 Modal 控制與送出邏輯
        function openAddModal() {
            document.getElementById('addName').value = '';
            document.getElementById('addCategory').value = 'yishan';
            document.getElementById('addPrice').value = '';
            document.getElementById('addDesc').value = '';
            document.getElementById('addLoc').value = '';
            document.getElementById('addTwdPriceHint').innerText = '約 NT$ 0';
            
            // 重設圖片上傳與預覽狀態
            document.getElementById('addImage').value = '';
            document.getElementById('addImgPlaceholder').style.display = 'block';
            document.getElementById('addImgPreview').style.display = 'none';
            document.getElementById('addImgPreview').src = '';
            document.getElementById('addImgSizeHint').style.display = 'none';
            document.getElementById('addImgSizeHint').innerText = '';
            compressedImageBase64 = null;
            
            const btn = document.getElementById('addSaveBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-plus"></i> 新增商品到 Notion';

            document.getElementById('addModal').style.display = 'flex';
        }

        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
        }

        function closeAddModalOnOuter(event) {
            if (event.target === document.getElementById('addModal')) {
                closeAddModal();
            }
        }

        // 手機/瀏覽器選取圖片與壓縮邏輯
        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 800; // 限制最大寬高以加速傳輸

                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 壓縮為 jpeg，品質 0.7 左右 (可大幅減少至 300KB 以內)
                    compressedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // 計算約略大小並顯示
                    const sizeInBytes = Math.round((compressedImageBase64.length * 3) / 4);
                    const sizeInKb = (sizeInBytes / 1024).toFixed(1);
                    
                    // 顯示預覽
                    document.getElementById('addImgPlaceholder').style.display = 'none';
                    const preview = document.getElementById('addImgPreview');
                    preview.src = compressedImageBase64;
                    preview.style.display = 'block';
                    
                    const sizeHint = document.getElementById('addImgSizeHint');
                    sizeHint.innerText = `已壓縮: ${sizeInKb} KB (點擊可更換)`;
                    sizeHint.style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function submitNewItem() {
            const name = document.getElementById('addName').value.trim();
            const categoryKey = document.getElementById('addCategory').value;
            const price = parseFloat(document.getElementById('addPrice').value) || 0;
            const desc = document.getElementById('addDesc').value.trim();
            const loc = document.getElementById('addLoc').value.trim();
            
            if (!name) {
                alert("請填寫商品名稱！");
                return;
            }

            const btn = document.getElementById('addSaveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在建立...';

            const statusPropType = (items.length > 0 && items[0].statusType) ? items[0].statusType : 'status';
            const statusName = statusRegistry.todo || "todo (⏳ 待採購)";
            
            const statusPayload = {};
            if (statusPropType === 'status') {
                statusPayload.status = { name: statusName };
            } else {
                statusPayload.select = { name: statusName };
            }

            const properties = {
                "Name": {
                    "title": [
                        {
                            "text": {
                                "content": name
                            }
                        }
                    ]
                },
                "Category": {
                    "select": {
                        "name": categoryRegistry[categoryKey]
                    }
                },
                "Price": {
                    "number": price
                },
                "Description": {
                    "rich_text": [
                        {
                            "text": {
                                "content": desc
                            }
                        }
                    ]
                },
                "Location": {
                    "rich_text": [
                        {
                            "text": {
                                "content": loc
                            }
                        }
                    ]
                },
                "Status": statusPayload
            };

            const payload = {
                action: "createPage",
                properties: properties
            };

            if (compressedImageBase64) {
                payload.imageFile = compressedImageBase64;
            }

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.message || errData.error || `HTTP ${response.status}`);
                }

                const result = await response.json();
                if (compressedImageBase64 && result.imageUploadError) {
                    alert("⚠️ 商品已成功新增到 Notion，但圖片上傳失敗！\n\n失敗原因：\n" + result.imageUploadError + "\n\n💡 建議與提示：\n1. (最推薦) 開啟並綁定 Cloudflare R2 儲存桶（綁定名稱設定為 MY_BUCKET），完全免費且 100% 穩定！\n2. 或者，前往 https://api.imgbb.com/ 註冊免費帳號並取得 API Key，於 Cloudflare Worker 環境變數新增 IMGBB_API_KEY。\n3. 請確認手機網路連線是否穩定。");
                } else {
                    alert("🎉 商品已成功新增到 Notion！");
                }
                closeAddModal();
                fetchFromNotion();
            } catch (error) {
                console.error("新增商品出錯:", error);
                alert("建立商品失敗：" + error.message + "\n請確認 Notion 權限或網路連線！");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-plus"></i> 新增商品到 Notion';
            }
        }

    </script>
